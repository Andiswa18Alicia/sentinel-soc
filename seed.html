async function seedData() {
  const btn = document.getElementById('seedBtn');
  btn.disabled = true;
  btn.textContent = 'Seeding...';

  log('Starting seed process...', 'info');
  log(`Writing ${INCIDENTS.length} incidents to Firestore...`, 'info');

  let success = 0;
  let failed = 0;

  for (const incident of INCIDENTS) {
    try {
      await db.collection('incidents').doc(incident.id).set(incident);
      log(`✓ ${incident.id} — ${incident.title.substring(0, 55)}...`, 'ok');
      success++;
    } catch (err) {
      log(`✗ ${incident.id} — ERROR: ${err.message}`, 'err');
      failed++;
    }
    // Small delay to avoid hammering Firestore
    await new Promise(r => setTimeout(r, 300));
  }

  log('', '');
  log(`━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`, 'info');
  log(`Seed complete: ${success} succeeded, ${failed} failed`, success === INCIDENTS.length ? 'ok' : 'warn');

  if (success > 0) {
    log('You can now open the dashboard to see your incidents.', 'info');
    btn.textContent = '✓ Done';
    btn.style.background = 'var(--green)';
    btn.style.color = '#000';
  } else {
    btn.disabled = false;
    btn.textContent = 'Retry';
  }
}
</script>
